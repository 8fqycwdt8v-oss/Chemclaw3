# CI gate: lint + type + test on every push and PR. A red run blocks merge —
# this is the automated half of the CLAUDE.md "green before done" rule and the
# machine that enforces the PR-gate (plan step 2.7) on knowledge PRs later.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # Real Postgres so the calculation-store integration tests run (not skip).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chemclaw
          POSTGRES_PASSWORD: chemclaw
          POSTGRES_DB: chemclaw
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U chemclaw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CHEMCLAW_POSTGRES_DSN: postgresql://chemclaw:chemclaw@localhost:5432/chemclaw
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync

      - name: Apply database migrations
        run: make db-migrate

      - name: Lint + type + test (with coverage gate)
        run: make lint type cov

      - name: Validate knowledge graph
        run: make kg-validate

      # The scientific quality gates: metric case-set + ELN export validation.
      - name: Run eval case-set
        run: make eval

      - name: Validate ELN exports
        run: make eln-validate

      - name: Validate skills
        run: make skill-validate
