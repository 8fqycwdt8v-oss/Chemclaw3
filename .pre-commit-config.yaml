# Pre-commit runs the same fast checks locally that CI enforces, so a push
# rarely fails on lint/format/types. Install once with `uv run pre-commit install`.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy chemclaw agents bo calc workflows workers tests
        language: system
        types: [python]
        pass_filenames: false
