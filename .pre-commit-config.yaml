# Pre-commit runs the same fast checks locally that CI enforces, so a push
# rarely fails on lint/format/types. Install once with `uv run pre-commit install`.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy (strict)
        # Invoke the Makefile target so the checked package set is the single source of
        # truth shared with CI — a narrower hook list used to let a type regression in
        # eln/evals/mcp_servers/memory/report/scripts pass pre-commit but fail CI.
        entry: make type
        language: system
        types: [python]
        pass_filenames: false
