{{- /* Schema migrations as a pre-deploy Helm hook (F6-T4, D-034): they run to completion before */ -}}
{{- /* the app rolls out, so no app container ever races the DDL. `make db-migrate` == this command. */ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chemclaw.name" . }}-migrate
  labels:
    {{- include "chemclaw.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "chemclaw.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "calc.migrate"]
          env:
            {{- include "chemclaw.env" . | nindent 12 }}
          envFrom:
            {{- include "chemclaw.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.mcp | nindent 12 }}
